[project]
name = "neuralgentics-web"
version = "0.15.0"
description = "Modular FastAPI web UI shell with a Grafana-style plugin manifest system. Standalone — no other dependencies required."
readme = "README.md"
license = {text = "MIT"}
requires-python = ">=3.12"
authors = [{name = "Veedubin"}]

dependencies = [
    "fastapi>=0.110.0",
    "uvicorn[standard]>=0.27.0",
    "jinja2>=3.1.0",
    "pydantic>=2.6.0",
    "pydantic-settings>=2.2.0",
    "pyyaml>=6.0.1",
    "sse-starlette>=1.8.0",
    "pyjwt>=2.8.0",
    "bcrypt>=4.1.0",
    # T-112: OIDC provider HTTP calls (GitHub/Google token exchange + userinfo).
    "httpx>=0.27.0",
    # T-112: Form parsing for /auth/login username+password (FastAPI Form()).
    "python-multipart>=0.0.9",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0.0",
    "pytest-asyncio>=0.23.0",
    "httpx>=0.27.0",
    "ruff>=0.4.0",
    "mypy>=1.9.0",
]
team-server = [
    "asyncpg>=0.29.0",
]

[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project.scripts]
# T-132: standalone console entry point. ``pip install neuralgentics-web``
# now provides a ``neuralgentics-web`` command. ``python -m neuralgentics.web``
# remains supported for backward compatibility.
neuralgentics-web = "neuralgentics.web.cli:main"

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
"neuralgentics.web" = [
    "py.typed",
    "shell/templates/*.html",
    "shell/static/*.css",
    "shell/static/*.js",
    "shell/static/*.SHA384",
    "shell/static/vendor/*.js",
    "shell/static/vendor/*.SHA384",
    "shell/static/vendor/README.md",
    "modules/*/module.yaml",
    "modules/*/templates/*.html",
    "modules/*/static/*.css",
]

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM", "C4"]

[tool.ruff.lint.per-file-ignores]
# B008: FastAPI's Depends()/require_role() in argument defaults is the
# idiomatic FastAPI pattern — the framework explicitly supports it.
"src/neuralgentics/web/auth/routes.py" = ["B008"]
"src/neuralgentics/web/shell/reload.py" = ["B008"]
"src/neuralgentics/web/shell/routes.py" = ["B008"]
"src/neuralgentics/web/modules/gateway_audit/routes.py" = ["B008"]
"src/neuralgentics/web/modules/broker_audit/routes.py" = ["B008"]
"src/neuralgentics/web/modules/memini_browser/routes.py" = ["B008"]
"tests/test_auth_*.py" = ["B008"]
"tests/test_module_reload.py" = ["B008"]
"tests/test_module_rbac.py" = ["B008"]
"tests/test_per_module_rbac.py" = ["B008"]

[tool.mypy]
strict = true
python_version = "3.12"
mypy_path = ["src"]
namespace_packages = true
explicit_package_bases = true
packages = ["neuralgentics.web"]

[[tool.mypy.overrides]]
module = "yaml"
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = "asyncpg"
ignore_missing_imports = true

# memini-ai is an OPTIONAL separate install (the web imports cleanly
# without it; SDKMeminiClient.create() raises a clear RuntimeError when
# the SDK backend is actually used without memini-ai installed).
[[tool.mypy.overrides]]
module = "memini_ai.*"
ignore_missing_imports = true

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"