name: broker-audit
version: 0.14.0
display_name: "Broker Audit"
description: "Live view of tool calls through the broker (inbound audit)"
author: Veedubin
license: MIT
rbac:
  # T-111: per-module RBAC overrides. Same as gateway-audit — the broker
  # audit module is read-only from the UI side.
  actions:
    view_audit: [viewer, operator, admin]
routes:
  - path: /modules/broker-audit
    method: GET
    template: tool_calls_table.html
  - path: /modules/broker-audit/sse
    method: GET
    handler: sse
api_endpoints:
  - path: /api/v1/broker-audit/recent
    method: GET
    handler: recent
sse_channels:
  - name: broker_audit_new
    path: /modules/broker-audit/sse
data_sources:
  - type: jsonl
    mode: embedded
  - type: postgres
    mode: team-server
    table: broker_audit_log