syntax = "proto3";

package embedding.v1;

option go_package = "neuralgentics/proto/embedding/v1;embeddingpb";

// EmbeddingService provides text-to-vector embedding via gRPC.
// The Python sidecar implements this service; the Go memory module
// connects as a client.
service EmbeddingService {
  // Embed generates a single embedding vector from text.
  rpc Embed(EmbedRequest) returns (EmbedResponse);

  // EmbedBatch generates embeddings for multiple texts in a streaming fashion.
  rpc EmbedBatch(stream EmbedRequest) returns (stream EmbedResponse);

  // Health checks if the sidecar is ready to serve requests.
  rpc Health(HealthRequest) returns (HealthResponse);
}

message EmbedRequest {
  string text = 1;
  string model = 2; // optional model override, empty = default
}

message EmbedResponse {
  repeated float vector = 1;
  int32 dimensions = 2;
  string model = 3;
  int64 latency_us = 4; // microseconds
}

message HealthRequest {}

message HealthResponse {
  string status = 1; // "ready" or error message
}