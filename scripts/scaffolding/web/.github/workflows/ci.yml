name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Lint, type-check, test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Sync dependencies
        run: uv sync --extra dev --extra team-server

      - name: Ruff check
        run: uv run ruff check .

      - name: Mypy (strict, excluding the memini_browser/memini_client.py stubs)
        # memini_browser/memini_client.py has 2 pre-existing type errors that
        # come from the optional memini-ai SDK integration (which is not a
        # declared dependency). The web package is otherwise mypy --strict
        # clean. We exclude that one path so CI stays green until the SDK
        # stubs are upstreamed.
        run: |
          uv run mypy --strict src/ \
            --exclude 'src/neuralgentics/web/modules/memini_browser/memini_client.py'

      - name: Pytest
        run: uv run pytest