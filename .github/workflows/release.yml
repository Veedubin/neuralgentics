# ─── Neuralgentics Release Pipeline ──────────────────────────────────────────
# Builds a single platform-independent tarball containing:
#   - @neuralgentics/plugin (compiled TypeScript overlay)
#   - .opencode/ config (agents, skills, opencode.json, AGENTS.md)
#
# No Go binaries. No TUI. No sidecar. No containers. Just the plugin
# that opencode loads and the config that makes it work.
#
# Triggers:
#   - Push of v* tag (e.g. v0.7.2)
#   - Manual workflow_dispatch for testing
# ────────────────────────────────────────────────────────────────────────────────

name: Release

on:
  push:
    tags: ['v*']
    branches: [main]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v0.7.2-rc1)'
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  VERSION: ${{ github.ref_name != '' && startsWith(github.ref_name, 'v') && github.ref_name || inputs.tag || '0.0.0-dev' }}

jobs:
  # ── Single job: compile plugin + bundle config + create release ──────────
  release:
    name: Build and Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      # ── Compile the overlay TypeScript plugin ────────────────────────────
      - name: Compile overlay plugin
        run: |
          cd overlay/packages/opencode
          npm install --no-audit --no-fund
          npx tsc
          cd "${{ github.workspace }}"

      # ── Assemble archive ────────────────────────────────────────────────
      - name: Assemble archive
        run: |
          VERSION_STR="$(echo "$VERSION" | sed 's/^v//')"
          ARCHIVE_DIR="neuralgentics-${VERSION_STR}"
          mkdir -p "dist/${ARCHIVE_DIR}"

          # ── Plugin (compiled overlay) ──────────────────────────────────
          mkdir -p "dist/${ARCHIVE_DIR}/node_modules/@neuralgentics/plugin"
          cp overlay/packages/opencode/package.json \
             "dist/${ARCHIVE_DIR}/node_modules/@neuralgentics/plugin/"
          cp -r overlay/packages/opencode/dist/* \
                "dist/${ARCHIVE_DIR}/node_modules/@neuralgentics/plugin/"

          # ── .opencode/ config ──────────────────────────────────────────
          mkdir -p "dist/${ARCHIVE_DIR}/.opencode/agents" \
                   "dist/${ARCHIVE_DIR}/.opencode/skills"
          cp .opencode/agents/*.md "dist/${ARCHIVE_DIR}/.opencode/agents/"
          cp -r .opencode/skills/* "dist/${ARCHIVE_DIR}/.opencode/skills/"
          cp .opencode/opencode.json "dist/${ARCHIVE_DIR}/.opencode/"
          cp .opencode/package.json "dist/${ARCHIVE_DIR}/.opencode/"
          cp .opencode/package-lock.json "dist/${ARCHIVE_DIR}/.opencode/"
          cp .opencode/.gitignore "dist/${ARCHIVE_DIR}/.opencode/"

          # Add the local overlay plugin as a file: dependency
          node -e "
            const pkg = require('./dist/${ARCHIVE_DIR}/.opencode/package.json');
            pkg.dependencies['@neuralgentics/plugin'] = 'file:../node_modules/@neuralgentics/plugin';
            require('fs').writeFileSync(
              './dist/${ARCHIVE_DIR}/.opencode/package.json',
              JSON.stringify(pkg, null, 2) + '\n'
            );
          "

          # Project instructions
          cp AGENTS.md "dist/${ARCHIVE_DIR}/.opencode/AGENTS.md"

          # Install script
          if [ -f "scripts/install.sh" ]; then
            cp scripts/install.sh "dist/${ARCHIVE_DIR}/install.sh"
            chmod +x "dist/${ARCHIVE_DIR}/install.sh"
          fi

          # Create tarball
          cd dist
          tar -czf "${ARCHIVE_DIR}.tar.gz" "${ARCHIVE_DIR}/"
          echo "archive=${ARCHIVE_DIR}.tar.gz" >> $GITHUB_OUTPUT
          echo "archive_dir=${ARCHIVE_DIR}" >> $GITHUB_OUTPUT
        shell: bash
        id: archive

      # ── Generate SHA256 ─────────────────────────────────────────────────
      - name: Generate SHA256
        run: |
          cd dist
          sha256sum "${{ steps.archive.outputs.archive }}" > checksums.txt
          cat checksums.txt
        shell: bash

      # ── Create GitHub Release (tag pushes only) ─────────────────────────
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: "${{ steps.archive.outputs.archive_dir }}"
          body: |
            ## neuralgentics ${{ steps.archive.outputs.archive_dir }}

            OpenCode plugin — agent personas, skills, routing enforcement, and MCP tools.

            ### Install
            ```bash
            curl -fsSL https://raw.githubusercontent.com/Veedubin/neuralgentics/main/scripts/install.sh | bash -s -- --home-dir --existing
            ```

            ### Activate
            ```bash
            cd your-project
            ln -s ~/.neuralgentics/.opencode .opencode
            opencode
            ```

            ### What's included
            - `@neuralgentics/plugin` — compiled TypeScript overlay (orchestrator, memory client, routing)
            - `.opencode/agents/` — 8 agent personas (architect, coder, explorer, git, orchestrator, reviewer, tester, writer)
            - `.opencode/skills/` — 5 skills (boomerang-orchestrator, kanban-board-manager, skill-self-audit, todo-list-updater, update-gh-docs)
            - `.opencode/opencode.json` — OpenCode config with Ollama Cloud models, MCP servers, LSP, formatter
            - `.opencode/AGENTS.md` — Project instructions and agent protocol
          files: |
            dist/${{ steps.archive.outputs.archive }}
            dist/checksums.txt
            scripts/install.sh
