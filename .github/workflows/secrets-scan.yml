name: Secret Scan

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install detect-secrets
        run: pip install detect-secrets
      - name: Scan for secrets
        run: detect-secrets-hook --baseline .secrets.baseline --exclude-files '^(.*cache|node_modules|\.git|\.tox|\.venv|__pycache__|\.pytest_cache|\.mypy_cache|\.ruff_cache|site|dist|build|\.egg-info|\.coverage|\.DS_Store)/.*' --exclude-secrets 'YOUR_OLLAMA_CLOUD_API_KEY' .
