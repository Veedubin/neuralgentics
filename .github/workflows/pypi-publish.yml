# ─── PyPI Publish — neuralgentics CLI ─────────────────────────────────────────
# Publishes the `neuralgentics` Python package (the bootstrapper CLI) to PyPI.
#
# This workflow is SEPARATE from release.yml (which handles the npm plugin +
# container images). The CLI lives at neuralgentics-cli/ inside this monorepo
# and has its own independent version stream (0.1.0, 0.1.1, ...).
#
# ── OIDC Trusted Publishing ──────────────────────────────────────────────────
# This workflow uses PyPI's "trusted publisher" mechanism (PEP 740). It does
# NOT use a PYPI_API_TOKEN secret. Instead, PyPI verifies the GitHub Actions
# OIDC token against a configured "pending publisher" on the PyPI project.
#
# ── ONE-TIME SETUP REQUIRED (before pushing the cli-v* tag) ──────────────────
# 1. Go to https://pypi.org/project/neuralgentics/ (create the project first
#    if it doesn't exist — the first publish can also use a "pending publisher"
#    to create the project automatically).
# 2. Open "Manage" → "Publishing" → "Add a publisher".
# 3. Configure the pending publisher:
#      PyPI Project Name:  neuralgentics
#      Owner:              Veedubin
#      Repository:         neuralgentics
#      Workflow filename:  .github/workflows/pypi-publish.yml
#      Environment name:   (leave blank — this workflow has no `environment:`)
# 4. Save. The workflow will be trusted on the next `cli-v*` tag push.
#
# ── Trigger ───────────────────────────────────────────────────────────────────
# Push of tags matching `cli-v*` (e.g. cli-v0.1.0, cli-v0.1.1). This namespace
# is distinct from the plugin's `v*` tags (e.g. v0.9.1) that trigger release.yml.
#
# ── Design doc ───────────────────────────────────────────────────────────────
# See neuralgentics/docs/design/init-cli-bootstrapper.md §8.5
# ──────────────────────────────────────────────────────────────────────────────

name: Publish to PyPI

on:
  push:
    tags: ['cli-v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'CLI release tag (e.g. cli-v0.1.0)'
        required: true
        type: string

permissions:
  contents: read
  id-token: write # Required for OIDC trusted publishing

concurrency:
  group: pypi-${{ github.ref }}
  cancel-in-progress: false

jobs:
  pypi-publish:
    name: Build and publish to PyPI
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ github.ref }}

      - name: Setup Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Sync dependencies
        working-directory: neuralgentics-cli
        run: uv sync

      - name: Build distributions
        working-directory: neuralgentics-cli
        run: uv build

      - name: Verify dist artifacts
        working-directory: neuralgentics-cli
        run: |
          if [ ! -d "dist" ]; then
            echo "ERROR: dist/ directory not found after build"
            exit 1
          fi
          echo "--- Built artifacts ---"
          ls -la dist/
          # Sanity: expect a wheel + sdist for neuralgentics
          if ! ls dist/*.whl 1> /dev/null 2>&1; then
            echo "ERROR: no .whl found in dist/"
            exit 1
          fi
          if ! ls dist/*.tar.gz 1> /dev/null 2>&1; then
            echo "ERROR: no sdist (.tar.gz) found in dist/"
            exit 1
          fi
          echo "Build output verified"

      - name: Publish to PyPI (OIDC trusted publishing, no token)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: neuralgentics-cli/dist/
          attestations: true