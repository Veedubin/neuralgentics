# docker-compose.yml — Neuralgentics container stack
# Compatible with both `docker compose` (v2.38+) and `podman-compose` (v1.x).
# Usage: docker compose up
#        podman-compose up
#
# For Podman on Fedora/RHEL, prefer podman-compose.yml which has SELinux labels.

version: "3.9"

services:
  # ── PostgreSQL 18 + pgvector + TimescaleDB ────────────────────────────────
  neuralgentics-postgres:
    image: ghcr.io/veedubin/neuralgentics-postgres:${NEURALGENTICS_VERSION:-latest}
    build:
      context: .
      dockerfile: docker/postgres.Dockerfile
    container_name: neuralgentics-postgres
    ports:
      - "${NEURALGENTICS_DB_PORT:-6000}:5432"
    environment:
      POSTGRES_USER: ${NEURALGENTICS_DB_USER:-postgres}
      POSTGRES_PASSWORD: ${NEURALGENTICS_DB_PASSWORD:-neuralgentics}
      POSTGRES_DB: ${NEURALGENTICS_DB_NAME:-neuralgentics}
    volumes:
      - neuralgentics-db:/var/lib/postgresql/data
    networks:
      - neuralgentics-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${NEURALGENTICS_DB_USER:-postgres} -d ${NEURALGENTICS_DB_NAME:-neuralgentics}"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  # ── Python gRPC embedding sidecar ────────────────────────────────────────
  neuralgentics-sidecar:
    image: ghcr.io/veedubin/neuralgentics-sidecar:${NEURALGENTICS_VERSION:-latest}
    build:
      context: .
      dockerfile: docker/sidecar.Dockerfile
    container_name: neuralgentics-sidecar
    environment:
      NEURAL_EMBED_ADDR: "0.0.0.0:50051"
      NEURALGENTICS_EMBED_DEVICE: ${NEURALGENTICS_EMBED_DEVICE:-cpu}
    volumes:
      - sidecar-cache:/root/.cache/huggingface
    networks:
      - neuralgentics-net
    depends_on:
      neuralgentics-postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import grpc; ch=grpc.insecure_channel('localhost:50051'); grpc.channel_ready_future(ch).result(timeout=5)\""]
      interval: 10s
      timeout: 7s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # ── Go backend (JSON-RPC over stdio + HTTP health on :8080) ──────────────
  neuralgentics-backend:
    image: ghcr.io/veedubin/neuralgentics-backend:${NEURALGENTICS_VERSION:-latest}
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
      args:
        VERSION: ${NEURALGENTICS_VERSION:-latest}
    container_name: neuralgentics-backend
    environment:
      NEURALGENTICS_DB_URL: postgresql://${NEURALGENTICS_DB_USER:-postgres}:${NEURALGENTICS_DB_PASSWORD:-neuralgentics}@neuralgentics-postgres:5432/${NEURALGENTICS_DB_NAME:-neuralgentics}
      NEURALGENTICS_DB_PORT: "5432"
      MEMINI_TRUST_ENGINE: "true"
      MEMINI_MEMORY_GRAPH: "true"
      MEMINI_KG_ENABLED: "true"
      THOUGHT_CHAINS: "true"
    networks:
      - neuralgentics-net
    depends_on:
      neuralgentics-postgres:
        condition: service_healthy
      neuralgentics-sidecar:
        condition: service_healthy
    restart: unless-stopped

volumes:
  neuralgentics-db:
  sidecar-cache:

networks:
  neuralgentics-net:
    driver: bridge
